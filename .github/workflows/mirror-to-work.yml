name: Mirror to work repo

on:
  push:
    branches: [master]

jobs:
  mirror:
    if: github.repository_owner == 'karinabaird-kaz'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.WORK_REPO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          echo "IdentityFile ~/.ssh/deploy_key" >> ~/.ssh/config

      - name: Push to karinabaird/brand-scoping-tool
        run: |
          git remote add work git@github.com:karinabaird/brand-scoping-tool.git
          git push work master --force
