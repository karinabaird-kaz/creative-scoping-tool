name: Mirror to work repo

on:
  push:
    branches: [master]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check token is set
        env:
          TOKEN: ${{ secrets.WORK_REPO_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "ERROR: WORK_REPO_TOKEN secret is empty or not set"
            exit 1
          else
            echo "Token is set (length: ${#TOKEN})"
          fi

      - name: Push to karinabaird/brand-scoping-tool
        env:
          TOKEN: ${{ secrets.WORK_REPO_TOKEN }}
        run: |
          git remote add work https://karinabaird:${TOKEN}@github.com/karinabaird/brand-scoping-tool.git
          git push work master
