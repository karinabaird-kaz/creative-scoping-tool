name: Mirror to work repo

on:
  push:
    branches: [master]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to karinabaird/brand-scoping-tool
        run: |
          git remote add work https://x-access-token:${{ secrets.WORK_REPO_TOKEN }}@github.com/karinabaird/brand-scoping-tool.git
          git push work master
